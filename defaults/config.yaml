# Orchestration config
# Generated by /init-orchestrator — edit as needed for this project.

project:
  name: ""          # fill in: short project name
  language: ""      # primary language: go, typescript, python, etc.
  test_command: ""  # command /qa runs to check tests, e.g. "go test ./..."
  build_command: "" # command to verify build, e.g. "go build ./..."

specs:
  design_path: .orchestration/specs/design    # /design outputs
  slices_path: .orchestration/specs/slices    # /slice outputs
  briefs_path: .orchestration/specs/briefs    # /spec outputs (delegation briefs)
  tasks_path:  .orchestration/specs/tasks     # /breakdown outputs

dashboard:
  path: .orchestration/dashboard

agents:
  # Default agent type when task content doesn't clearly indicate a specialization
  default: server-dev

  # Sequential by default — set to false for specs with independent parallel slices
  sequential_tasks: true

  # Whether /implement should suggest worktree isolation for tasks
  # (set to true when parallel execution is configured)
  suggest_worktree: false

root_context:
  # Path to project root context (relative to project root)
  # Set this if your root context is not at .root-context/
  path: .root-context

commit:
  # Whether /commit should prompt to push after committing
  prompt_push: true
